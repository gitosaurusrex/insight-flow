services:
  # FastAPI Web Service
  - type: web
    name: insightflow-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: insightflow-db
          property: connectionString
      - key: MONGO_URL
        sync: false  # Set manually — use MongoDB Atlas connection string
      - key: MONGO_DB
        value: insightflow
      - key: REDIS_URL
        fromService:
          name: insightflow-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: insightflow-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: insightflow-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://insightflow-frontend.onrender.com,http://localhost:3000

  # Celery Worker
  - type: worker
    name: insightflow-worker
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile.worker
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: insightflow-db
          property: connectionString
      - key: MONGO_URL
        sync: false  # Set manually — use MongoDB Atlas connection string
      - key: MONGO_DB
        value: insightflow
      - key: REDIS_URL
        fromService:
          name: insightflow-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: insightflow-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: insightflow-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  # React Frontend (static site)
  - type: web
    name: insightflow-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /api/*
        destination: https://insightflow-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

  # Redis
  - type: redis
    name: insightflow-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # Allow all connections from Render's internal network

databases:
  - name: insightflow-db
    plan: free
    databaseName: insightflow
